<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TimeLock</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(-45deg, #020617, #0f172a, #020617, #1e293b);
  background-size: 400% 400%;
  animation: bg 15s ease infinite;
  color: white;
  min-height: 100vh;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

header {
  padding: 25px;
  font-size: 32px;
  font-weight: 700;
  text-align: center;
  letter-spacing: 1px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(15px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 25px;
  gap: 25px;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  padding: 25px;
  width: 320px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
  transition: 0.4s;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.1), transparent);
  top: -50%;
  left: -50%;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
}

h2 {
  margin-bottom: 15px;
  font-weight: 500;
}

.status {
  color: #22c55e;
  font-weight: bold;
}

#timer {
  font-size: 42px;
  text-align: center;
  margin: 20px 0;
  font-weight: 700;
}

/* barra circular */
.circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: conic-gradient(#22c55e 0deg, rgba(255,255,255,0.1) 0deg);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
}

.circle span {
  font-size: 20px;
}

.app {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-radius: 12px;
  transition: 0.3s;
}

.app:hover {
  background: rgba(255,255,255,0.1);
  transform: scale(1.03);
}

input {
  width: 80%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 80%;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

.alert {
  color: #ef4444;
  margin-top: 10px;
  text-align: center;
  min-height: 20px;
}

/* toast bonito */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(50px);
  background: rgba(0,0,0,0.8);
  padding: 15px 25px;
  border-radius: 12px;
  opacity: 0;
  transition: 0.4s;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<header>🔒 TimeLock</header>

<div class="container">

  <div class="card">
    <h2>📱 Dispositivo</h2>
    <p class="status">● Conectado</p>
    <p>iPhone 13 Pro</p>
    <p id="profile"></p>
  </div>

  <div class="card">
    <h2>⏱ Tempo de Tela</h2>
    <div id="timer">00:00:00</div>

    <div class="circle" id="circle">
      <span id="percent">0%</span>
    </div>
  </div>

  <div class="card">
    <h2>📊 Apps mais usados</h2>
    <div id="apps"></div>
  </div>

  <div class="card">
    <h2>🔒 Limite</h2>
    <input type="number" id="limit" placeholder="Minutos">
    <button onclick="start()">Ativar</button>
    <div id="alert" class="alert"></div>
  </div>

</div>

<div id="toast" class="toast"></div>

<script>
let seconds = 43000;
let limit = 0;
let interval;

const profiles = ["viciado", "equilibrado", "produtivo"];
let profile = profiles[Math.floor(Math.random() * profiles.length)];
document.getElementById("profile").innerText = "Perfil: " + profile;

const apps = [
  {name: "Instagram", time: 10000},
  {name: "TikTok", time: 20000},
  {name: "YouTube", time: 4000},
  {name: "WhatsApp", time: 6000},
  {name: "Chrome", time: 3000}
];

let currentApp = null;
let sessionTime = 0;
let isIdle = false;
let idleTime = 0;

function formatTime(sec) {
  let h = String(Math.floor(sec / 3600)).padStart(2, '0');
  let m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
  let s = String(sec % 60).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function chooseApp() {
  return apps[Math.floor(Math.random() * apps.length)];
}

function updateApps() {
  let container = document.getElementById("apps");
  container.innerHTML = "";

  let sorted = [...apps].sort((a,b) => b.time - a.time);

  sorted.forEach(app => {
    let active = (app === currentApp && !isIdle) ? "🔥" : "";
    let div = document.createElement("div");
    div.className = "app";

    div.innerHTML = `
      <span>${active} ${app.name}</span>
      <span>${formatTime(app.time)}</span>
    `;

    container.appendChild(div);
  });
}

function updateCircle(percent) {
  let circle = document.getElementById("circle");
  circle.style.background = `conic-gradient(#22c55e ${percent*3.6}deg, rgba(255,255,255,0.1) 0deg)`;
  document.getElementById("percent").innerText = Math.floor(percent) + "%";
}

function start() {
  limit = document.getElementById("limit").value * 60;

  if (!limit) {
    alert("Define um limite!");
    return;
  }

  clearInterval(interval);
  currentApp = chooseApp();
  sessionTime = 100;

  interval = setInterval(() => {
    seconds++;
    document.getElementById("timer").innerText = formatTime(seconds);

    if (!isIdle && Math.random() < 0.02) {
      isIdle = true;
      idleTime = 30;
      document.getElementById("alert").innerText = "😴 Tela desligada";
    }

    if (isIdle) {
      idleTime--;
      if (idleTime <= 0) {
        isIdle = false;
        currentApp = chooseApp();
        document.getElementById("alert").innerText = "";
      }
    } else {
      currentApp.time++;
      sessionTime--;

      if (Math.random() < 0.05) {
        document.getElementById("toast").innerText = "🔔 Nova notificação";
        document.getElementById("toast").classList.add("show");
        setTimeout(() => {
          document.getElementById("toast").classList.remove("show");
        }, 2000);
      }

      if (sessionTime <= 0) {
        currentApp = chooseApp();
        sessionTime = 120;
      }
    }

    updateApps();

    let percent = (seconds / limit) * 100;
    updateCircle(percent);

    if (percent >= 100) {
      document.getElementById("alert").innerText = "🚫 LIMITE ATINGIDO";
    }

  }, 1000);
}

document.getElementById("timer").innerText = formatTime(seconds);
updateApps();
</script>

</body>
</html>
